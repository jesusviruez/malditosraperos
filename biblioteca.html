<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca rap español</title>

  <style>
    :root {
      --bg-color: #0b0c10;
      --card-bg: #1f2833;
      --accent-color: #66fcf1;
      --accent-hover: #45f3e5;
      --text-color: #c5c6c7;
      --text-title: #ffffff;
      --text-muted: #858585;
      --border-radius: 12px;
      --transition: all 0.3s cubic-bezier(.25,.8,.25,1);
    }

    body {
      background: var(--bg-color);
      color: var(--text-color);
      font-family: sans-serif;
      padding: 20px;
    }

    .albums-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px,1fr));
      gap: 20px;
    }

    .album-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 15px;
    }

    .btn {
      padding: 8px 10px;
      border: none;
      cursor: pointer;
      border-radius: 8px;
      margin-top: 6px;
    }

    .album-edit-btn {
      background: #2a2a2a;
      color: white;
    }

    .album-delete-btn {
      border: 1px solid rgba(255, 74, 74, 0.4);
      color: #ff4a4a;
      background: transparent;
    }

    .album-delete-btn:hover {
      background: #ff4a4a;
      color: white;
    }
  </style>
</head>

<body>

<h1>Biblioteca</h1>

<div id="albumsGrid" class="albums-grid"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot,
  doc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";


const firebaseConfig = {
  apiKey: "API_KEY",
  authDomain: "xxx.firebaseapp.com",
  projectId: "xxx"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const ADMIN_EMAILS = ['malditosraperos@gmail.com'];

let isAdmin = false;
let albums = [];

/* =========================
   AUTH
========================= */

onAuthStateChanged(auth, (user) => {
  isAdmin = !!user && ADMIN_EMAILS.includes((user.email || '').toLowerCase());
  renderAlbums();
});

/* =========================
   DATA
========================= */

onSnapshot(collection(db, 'albums'), (snapshot) => {
  albums = [];
  snapshot.forEach(docSnap => {
    albums.push({ id: docSnap.id, ...docSnap.data() });
  });
  renderAlbums();
});

/* =========================
   RENDER
========================= */

function renderAlbums() {
  const grid = document.getElementById("albumsGrid");
  grid.innerHTML = "";

  albums.forEach(album => {

    const card = document.createElement("div");
    card.className = "album-card";

    card.innerHTML = `
      <h3>${album.title}</h3>
      <p>${album.author}</p>

      ${isAdmin ? `
        <button class="btn album-edit-btn">
          ✏️ Editar
        </button>

        <button 
          class="btn album-delete-btn"
          onclick="deleteAlbum('${album.id}')"
        >
          🗑️ Eliminar disco
        </button>
      ` : ""}
    `;

    grid.appendChild(card);
  });
}

/* =========================
   DELETE
========================= */

window.deleteAlbum = async function(albumId) {

  if (!isAdmin) {
    alert("No tienes permisos");
    return;
  }

  const confirmDelete = confirm("¿Eliminar disco?");
  if (!confirmDelete) return;

  try {
    await deleteDoc(doc(db, "albums", albumId));
    alert("Eliminado");
  } catch (e) {
    console.error(e);
    alert("Error al eliminar");
  }
};

</script>

</body>
</html>
